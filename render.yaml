services:
  - type: web
    name: taktledger
    runtime: python
    plan: free
    buildCommand: |
      cd frontend
      npm ci
      npm run build
      cd ../backend
      pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.11
      - key: OPENAI_MODEL
        value: gpt-4.1
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_TIMEOUT_MS
        value: 45000
      - key: OPENAI_MAX_ATTEMPTS
        value: 2
      - key: OPENAI_REQUIRE_LIVE
        value: true
      - key: DATABASE_URL
        value: sqlite:///./taktledger.db
      - key: UPLOAD_DIR
        value: uploads
