services:
  - type: web
    name: taktledger
    runtime: python
    plan: free
    buildCommand: |
      cd frontend
      npm ci
      npm run build
      cd ../backend
      pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.11
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_TIMEOUT_MS
        value: 15000
      - key: DATABASE_URL
        value: sqlite:///./taktledger.db
      - key: UPLOAD_DIR
        value: uploads
